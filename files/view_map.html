<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>食PULL - マップ表示</title>
    <link rel="stylesheet" href="../css/index.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body>
    <header class="header">
        <div class="logo-container">
            <a href="../index.html">
                <img alt="食PULL Logo" class="logo-img" src="../image/食pull.png">
                <h1 class="logo-title">食PULL</h1>
            </a>
        </div>
        <nav class="nav-menu">
            <a href="../index.html" class="nav-link">ホーム</a>
            <a href="view_map.html" class="nav-link">マップ</a>
            <a href="#" class="nav-link">設定</a>
        </nav>
    </header>

    <div class="map-container">
        <div id="map"></div>
        <div class="location-info">
            <h3 class="location-title">フードドライブ拠点</h3>
            <div class="location-details">
                <p>住所: 東京都新宿区西新宿2-8-1</p>
                <p>受付時間: 9:00-17:00</p>
                <p>available-items>集めている食材: 缶詰、レトルト食品</p>
            </div>
        </div>
        <div class="control-panel">
            <button class="control-button">
                <span class="material-icons">my_location</span>
                現在地を表示
            </button>
            <button class="control-button">
                <span class="material-icons">filter_list</span>
                絞り込み
            </button>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY"></script>
    <script>
        function initMap() {
            const map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 35.6895, lng: 139.6917 },
                zoom: 13
            });
        }
    </script>
</body>
</html>
