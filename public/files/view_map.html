<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>マップ - 食PULL</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="../css/map.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>

     <!-- 先に map 初期化を定義するスクリプトを読み込み（defer） -->
    <script src="../js/map.js" defer></script>
    <!-- Google Maps API（callback=initMap を追加、YOUR_KEY は既に入っている場合そのまま可） -->
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDwJ6Lhxfb9hnhAxFD484PEpxCC9wPV4dI&callback=initMap&language=ja"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <div class="logo-container">
                    <img alt="食PULL Logo" class="logo-img" src="../image/食pull.png">
                    <h1 class="logo-title">食PULL</h1>
                </div>
                <!-- ハンバーガーボタンとナビは不要のため削除 -->
            </div>
        </header>

        <main class="map-container">
            <div id="map"></div>
            
            <div class="control-panel">
                <!-- 検索バー -->
                <div class="search-bar">
                    <span class="material-icons">search</span>
                    <input type="text" placeholder="場所を検索">
                </div>
                
                <!-- フィルターパネル -->
                <div class="filter-panel">
                    <button class="filter-button">
                        <span class="material-icons">filter_list</span>
                        フィルター
                    </button>
                </div>
            </div>

            <!-- 場所詳細ポップアップ -->
            <div class="location-popup" style="display: none;">
                <div class="popup-content">
                    <div class="popup-header">
                        <h3>場所の詳細</h3>
                        <button class="close-button">
                            <span class="material-icons">close</span>
                        </button>
                    </div>
                    <div class="location-details">
                        <div class="location-image">
                            <img src="../image/placeholder.jpg" alt="場所の画像">
                        </div>
                        <h4 class="location-name">フードバンク名称</h4>
                        <div class="location-info">
                            <p class="location-address">
                                <span class="material-icons">location_on</span>
                                住所が表示されます
                            </p>
                            <p class="location-time">
                                <span class="material-icons">access_time</span>
                                営業時間: 9:00-18:00
                            </p>
                        </div>
                        <div class="food-info">
                            <h5>提供可能な食材</h5>
                            <div class="food-tags">
                                <span class="food-tag">米</span>
                                <span class="food-tag">野菜</span>
                                <span class="food-tag">缶詰</span>
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button class="contact-button primary-button">
                                <span class="material-icons">message</span>
                                連絡する
                            </button>
                            <button class="share-button secondary-button">
                                <span class="material-icons">share</span>
                                共有
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
