<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ログイン - 食PULL</title>

  <!-- 既存グローバルCSS（色・ダークモードなど） -->
  <link rel="stylesheet" href="../css/login.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body class="login-page">
  <div class="container login-container">
    <!-- ロゴとサブタイトル -->
    <header class="header">
      <div class="logo-container">
        <img src="image/食pull.png" alt="食PULL ロゴ" class="logo-img">
        <h1 class="logo-title">食PULL</h1>
      </div>
      <p class="logo-subtitle">フードドライブをもっと身近に。</p>
    </header>

    <!-- ログインカード（中央配置） -->
    <main class="login-card" role="main" aria-labelledby="login-title">
      <h2 id="login-title" class="section-title">ログイン</h2>

      <form class="login-form" action="home.html" method="POST" autocomplete="on">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" name="email" placeholder="example@mail.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">パスワード</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" minlength="8">
            <button type="button" class="pwd-toggle" aria-label="パスワード表示切替" title="パスワード表示切替">
              <span class="material-icons">visibility</span>
            </button>
          </div>
        </div>

        <!-- 「パスワードを忘れた」は削除済み -->
        <div class="form-row">
          <label class="checkbox">
            <input type="checkbox" id="remember" name="remember">
            <span>ログインを保持</span>
          </label>
        </div>

        <button type="submit" class="login-button">ログイン</button>

        <p class="form-link">
          初めての方は <a href="signup.html">新規登録</a>
        </p>
      </form>
    </main>
  </div>

  <footer class="footer" aria-hidden="true">
    <div class="footer-content">
      <p></p>
    </div>
  </footer>

  <!-- JS: パスワード表示切替と簡易バリデーション -->
  <script>
         (function(){
           const form = document.querySelector('.login-form');
           const email = document.getElementById('email');
           const pwd = document.getElementById('password');
           const toggle = document.querySelector('.pwd-toggle');
 
           // パスワード表示切替
           toggle.addEventListener('click', () => {
             if (pwd.type === 'password') {
               pwd.type = 'text';
               toggle.innerHTML = '<span class="material-icons">visibility_off</span>';
             } else {
               pwd.type = 'password';
               toggle.innerHTML = '<span class="material-icons">visibility</span>';
             }
           });
 
           // 送信時簡易チェック
           form.addEventListener('submit', (e) => {
             // ブラウザ組み込みのバリデーションを優先
             if (!form.checkValidity()) {
               e.preventDefault();
               form.reportValidity();
               return;
             }
             // 追加チェック：パスワード長
             if (pwd.value.trim().length < 8) {
               e.preventDefault();
               alert('パスワードは8文字以上で入力してください。');
               pwd.focus();
             }
           });
         })();
       </script>
</body>
</html>
