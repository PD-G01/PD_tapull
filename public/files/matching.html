<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>食PULL - マッチング機能</title>
    <link rel="stylesheet" href="../css/matching.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body class=""> 
    <div class="container">
        <header class="header">
            <div class="logo-container">
                <img alt="食PULL Logo" class="logo-img" src="image/食pull.png">
                <h1 class="logo-title">食PULL</h1>
            </div>
            <p class="logo-subtitle">フードドライブマッチング機能への入り口</p>
        </header>

        <section id="matching-entry">
            <h2 class="section-title">あなたはどちらのユーザーですか？</h2>
            
            <div class="matching-selection">
                <a href="contributor_match.html" class="selection-card">
                    <span class="material-icons selection-icon">send</span>
                    <h3 class="selection-title">食材を提供する (寄付者)</h3>
                    <p class="selection-description">余っている食材を必要としている団体・個人に届けたい方</p>
                </a>

                <a href="recipient_match.html" class="selection-card">
                    <span class="material-icons selection-icon">volunteer_activism</span>
                    <h3 class="selection-title">食材を受け取る (団体・個人)</h3>
                    <p class="selection-description">フードドライブで集まった食材を募集・受け取りたい団体や個人の方</p>
                </a>
            </div>
            
            <a href="index.html" class="back-link">
                <span class="material-icons">arrow_back</span>
                トップページへ戻る
            </a>
        </section>

    </div>

    <footer class="footer">
        <div class="container footer-content">
            <p>© 2024 食PULL. All Rights Reserved.</p>
        </div>
    </footer>
    
    </body>
</html>
