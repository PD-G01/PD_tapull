<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>アカウント作成 - 食PULL</title>
    <link rel="stylesheet" href="../css/signup.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
</head>
<body>
    <!-- トップヘッダー -->
    <header class="header">
        <div class="header-container">
            <a href="../index.html" class="back-link">
                <span class="material-icons">arrow_back</span>
            </a>
            <h1>アカウント作成</h1>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="main-container">
        <div class="signup-card">
            <form id="signupForm" class="signup-form">
                <!-- プロフィール画像アップロード -->
                <div class="avatar-section">
                    <div class="avatar-preview">
                        <span class="material-icons">account_circle</span>
                    </div>
                    <label class="avatar-upload-button">
                        プロフィール画像を選択
                        <input type="file" accept="image/*" id="avatarInput" hidden>
                    </label>
                </div>

                <!-- 入力フォーム -->
                <div class="form-group">
                    <label for="name">名前</label>
                    <input type="text" id="name" name="name" required 
                           placeholder="例：山田 太郎">
                    <span class="error-text" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス</label>
                    <input type="email" id="email" name="email" required
                           placeholder="例：example@mail.com">
                    <span class="error-text" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">パスワード</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" 
                               required minlength="8"
                               placeholder="8文字以上で入力してください">
                        <button type="button" class="toggle-password">
                            <span class="material-icons">visibility_off</span>
                        </button>
                    </div>
                    <span class="error-text" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">パスワード（確認）</label>
                    <div class="password-input">
                        <input type="password" id="confirmPassword" 
                               name="confirmPassword" required
                               placeholder="もう一度パスワードを入力">
                        <button type="button" class="toggle-password">
                            <span class="material-icons">visibility_off</span>
                        </button>
                    </div>
                    <span class="error-text" id="confirmPasswordError"></span>
                </div>

                <!-- アカウントタイプ -->
                <div class="form-group">
                    <label>アカウントタイプ</label>
                    <div class="account-type-toggle">
                        <label class="type-option">
                            <input type="radio" name="accountType" 
                                   value="personal" checked>
                            <span>個人</span>
                        </label>
                        <label class="type-option">
                            <input type="radio" name="accountType" 
                                   value="organization">
                            <span>団体</span>
                        </label>
                    </div>
                </div>

                <!-- 利用規約同意 -->
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="termsAgreement" required>
                        <span class="checkbox-text">
                            <a href="#" class="link-text">利用規約</a>と
                            <a href="#" class="link-text">プライバシーポリシー</a>に同意する
                        </span>
                    </label>
                    <span class="error-text" id="termsError"></span>
                </div>

                <!-- 登録ボタン -->
                <button type="submit" class="submit-button">
                    アカウントを作成
                </button>

                <!-- ログインリンク -->
                <p class="login-text">
                    すでにアカウントをお持ちの方は<a href="login.html" class="link-text">こちら</a>
                </p>
            </form>
        </div>
    </main>

    <script src="../js/signup.js"></script>
</body>
</html>
